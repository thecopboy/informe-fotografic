server {
    listen 80;
    server_name localhost;

    # Augmentem el límit de mida per permetre pujades de fotos grans
    client_max_body_size 100M;

    # Logs access/error d'Nginx cap a la sourtida estàndard de Docker
    access_log /dev/stdout;
    error_log /dev/stderr;

    location / {
        proxy_pass http://127.0.0.1:33333;
        proxy_http_version 1.1;
        
        # Capçaleres crítiques per passar la IP real (des d'infoto.cat a l'aplicació)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Suport WebSocket (útil per si al futur s'empren Connexions Persistents/SSE)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts més llargs per permetre pujades d'arxius o processament fotogràfic
        proxy_read_timeout 120s;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
    }
}
