services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: informe-fotografic:latest
    container_name: informe-fotografic
    expose:
      - "80"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    networks:
      - proxy-net
    restart: unless-stopped
    # healthcheck es pot posar opcionalment

networks:
  proxy-net:
    external: true
